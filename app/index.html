<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quero Mais</title>
    <link rel="icon" type="image/png" href="/QMicon02.png" />
  </head>
  <body>
    <!-- Aplica cores salvas antes do React renderizar — elimina flash -->
    <script>
      (function () {
        try {
          var pc = localStorage.getItem('@QueroMais:primaryColor');
          var sc = localStorage.getItem('@QueroMais:secondaryColor');
          if (pc) document.documentElement.style.setProperty('--primary-color', pc);
          if (sc) document.documentElement.style.setProperty('--secondary-color', sc);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
